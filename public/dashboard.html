<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spike — Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --nav-h: 52px;
      --sidebar-w: 272px;
      --bg: #1A1917;
      --surface: #1F1E1C;
      --surface2: #2A2926;
      --border: #333230;
      --border2: #47453F;
      --text: #EEECEA;
      --text-muted: #9C9A92;
      --text-subtle: #57554E;
      --accent: #D97757;
      --accent-dim: #C06240;
      --accent-glow: rgba(217,119,87,0.18);
      --accent-light: rgba(217,119,87,0.09);
    }

    html, body { height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }

    /* ── Navbar ─────────────────────────────────────────────────── */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 16px; z-index: 100; gap: 12px;
    }

    .nav-logo {
      display: flex; align-items: center; gap: 9px;
      flex: 0 0 var(--sidebar-w);
      padding-right: 16px;
      border-right: 1px solid var(--border);
    }

    /* Claude-style asterisk logo */
    .nav-logo-mark {
      width: 26px; height: 26px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }

    .nav-logo span { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }

    .nav-title { flex: 1; font-size: 13px; font-weight: 400; color: var(--text-subtle); padding-left: 16px; }

    .nav-user { display: flex; align-items: center; gap: 10px; }
    .nav-user-name { font-size: 13px; font-weight: 500; color: var(--text-muted); }

    .nav-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(217,119,87,0.18);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600; color: #E8A88A;
      flex-shrink: 0; overflow: hidden;
      border: 1px solid rgba(217,119,87,0.22);
    }

    .nav-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .nav-logout {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 10px;
      background: transparent; border: 1px solid var(--border);
      border-radius: 7px; color: var(--text-muted);
      font-size: 12px; font-weight: 500; font-family: 'Inter', sans-serif;
      cursor: pointer; text-decoration: none; transition: all 0.15s;
    }

    .nav-logout:hover { border-color: var(--border2); color: var(--text); background: var(--surface2); }
    .nav-logout svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Layout ─────────────────────────────────────────────────── */
    .layout { display: flex; height: 100vh; padding-top: var(--nav-h); }

    /* ── Sidebar ────────────────────────────────────────────────── */
    .sidebar {
      flex: 0 0 var(--sidebar-w); height: 100%;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }

    .sidebar-header { padding: 14px 16px 12px; border-bottom: 1px solid var(--border); }

    .sidebar-header h2 {
      font-size: 11px; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.7px;
    }

    .sidebar-date { font-size: 11px; color: var(--text-subtle); margin-top: 2px; }

    .sidebar-refresh {
      display: inline-flex; align-items: center; gap: 4px;
      margin-top: 8px; background: none; border: none; cursor: pointer;
      font-size: 11px; font-weight: 500; color: var(--accent);
      font-family: 'Inter', sans-serif; padding: 0; opacity: 0.55; transition: opacity 0.15s;
    }

    .sidebar-refresh svg { width: 10px; height: 10px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .sidebar-refresh:hover { opacity: 1; }

    .events-list { flex: 1; overflow-y: auto; padding: 8px; }
    .events-list::-webkit-scrollbar { width: 3px; }
    .events-list::-webkit-scrollbar-track { background: transparent; }
    .events-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    .event-card {
      padding: 10px 12px; border-radius: 9px;
      border: 1px solid var(--border); margin-bottom: 5px;
      background: var(--bg); transition: border-color 0.15s, background 0.15s; cursor: default;
    }

    .event-card:hover { border-color: var(--border2); background: rgba(255,255,255,0.015); }

    .event-card-title {
      font-size: 12.5px; font-weight: 500; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px;
    }

    .event-card-time { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-muted); }

    .event-dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

    .event-location { font-size: 10.5px; color: var(--text-subtle); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .sidebar-empty { text-align: center; padding: 24px 16px; color: var(--text-muted); font-size: 12px; }
    .sidebar-empty svg { width: 28px; height: 28px; stroke: var(--border2); fill: none; stroke-width: 1.5; margin-bottom: 8px; stroke-linecap: round; stroke-linejoin: round; display: block; margin-left: auto; margin-right: auto; }

    .skeleton {
      background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
      background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 7px;
    }

    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

    /* ── Chat area ──────────────────────────────────────────────── */
    .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }

    .chat-messages {
      flex: 1; overflow-y: auto;
      padding: 24px 0 8px;
      display: flex; flex-direction: column; gap: 2px;
    }

    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    /* ── Welcome screen ─────────────────────────────────────────── */
    .chat-welcome {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0; text-align: center; padding: 32px 40px; user-select: none;
    }

    /* ── Anthropic-style asterisk logo scene ────────────────────── */
    .bot-scene {
      position: relative; width: 180px; height: 180px;
      margin-bottom: 32px;
      display: flex; align-items: center; justify-content: center;
    }

    .logo-glow {
      position: absolute; width: 120px; height: 120px; border-radius: 50%;
      background: radial-gradient(circle, rgba(217,119,87,0.12) 0%, transparent 70%);
      animation: glow-pulse 3s ease-in-out infinite;
    }

    @keyframes glow-pulse {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.15); opacity: 1; }
    }

    .logo-ring {
      position: absolute; border-radius: 50%;
      border: 1px solid rgba(217,119,87,0.08);
    }

    .logo-ring-1 { width: 130px; height: 130px; animation: ring-spin 20s linear infinite; }
    .logo-ring-2 { width: 162px; height: 162px; border-color: rgba(217,119,87,0.05); animation: ring-spin 30s linear infinite reverse; }

    .logo-ring-1::after, .logo-ring-2::after {
      content: ''; position: absolute; border-radius: 50%;
      top: -2.5px; left: 50%; transform: translateX(-50%);
    }

    .logo-ring-1::after { width: 5px; height: 5px; background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    .logo-ring-2::after { width: 4px; height: 4px; background: #C4906A; box-shadow: 0 0 6px #C4906A; }

    @keyframes ring-spin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to   { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .logo-ring-1, .logo-ring-2 {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }

    .logo-center {
      position: relative; z-index: 2;
      animation: logo-breathe 4s ease-in-out infinite;
    }

    @keyframes logo-breathe {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 4px 24px rgba(217,119,87,0.3)); }
      50%       { transform: scale(1.04); filter: drop-shadow(0 4px 36px rgba(217,119,87,0.5)); }
    }

    .asterisk-arm {
      transform-origin: 50px 50px;
      animation: arm-shimmer 3s ease-in-out infinite;
    }

    .asterisk-arm:nth-child(1) { animation-delay: 0s; }
    .asterisk-arm:nth-child(2) { animation-delay: 0.5s; }
    .asterisk-arm:nth-child(3) { animation-delay: 1s; }
    .asterisk-arm:nth-child(4) { animation-delay: 1.5s; }
    .asterisk-arm:nth-child(5) { animation-delay: 2s; }
    .asterisk-arm:nth-child(6) { animation-delay: 2.5s; }

    @keyframes arm-shimmer {
      0%, 100% { opacity: 0.85; }
      50%       { opacity: 1; }
    }

    .chat-welcome h3 {
      font-size: 22px; font-weight: 600; color: var(--text);
      letter-spacing: -0.4px; margin-bottom: 8px;
    }

    .chat-welcome p {
      font-size: 14.5px; color: var(--text-muted);
      max-width: 400px; line-height: 1.65; margin-bottom: 28px;
    }

    .suggestions {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center; max-width: 520px;
    }

    .suggestion {
      padding: 8px 15px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; font-size: 13px; font-weight: 400;
      color: var(--text-muted); cursor: pointer;
      transition: all 0.15s; font-family: 'Inter', sans-serif;
    }

    .suggestion:hover { border-color: rgba(217,119,87,0.3); color: var(--text); background: var(--surface2); }

    /* ── Messages ───────────────────────────────────────────────── */
    .msg { width: 100%; padding: 8px 0; }

    .msg-inner {
      max-width: 720px; margin: 0 auto;
      padding: 0 28px;
      display: flex; gap: 12px; align-items: flex-start;
    }

    .msg.user .msg-inner { flex-direction: row-reverse; }

    .msg-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 600; margin-top: 3px;
    }

    .msg.user .msg-avatar {
      background: rgba(217,119,87,0.18); color: #E8A88A;
      border: 1px solid rgba(217,119,87,0.22);
    }

    .msg.bot .msg-avatar {
      background: transparent;
      border: none;
      padding: 0;
    }

    .msg-body { flex: 1; min-width: 0; }

    .msg.user .msg-body { display: flex; flex-direction: column; align-items: flex-end; }

    .msg-bubble { font-size: 14.5px; line-height: 1.7; color: var(--text); word-break: break-word; }

    .msg.user .msg-bubble {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 18px; border-bottom-right-radius: 4px;
      padding: 10px 14px; display: inline-block; max-width: 100%;
    }

    .msg.bot .msg-bubble { padding: 2px 0; }

    .msg.bot .msg-bubble strong { font-weight: 600; color: #E0BFB0; }
    .msg.bot .msg-bubble em { font-style: italic; }
    .msg.bot .msg-bubble ul { margin: 8px 0 4px 20px; }
    .msg.bot .msg-bubble li { margin-bottom: 5px; }
    .msg.bot .msg-bubble p + p { margin-top: 8px; }

    .msg-time { font-size: 10.5px; color: var(--text-subtle); margin-top: 4px; padding: 0 2px; }
    .msg.user .msg-time { text-align: right; }

    /* ── Typing indicator ───────────────────────────────────────── */
    .typing-indicator { display: none; width: 100%; padding: 6px 0 4px; }
    .typing-indicator.visible { display: block; }

    .typing-inner {
      max-width: 720px; margin: 0 auto;
      padding: 0 28px;
      display: flex; gap: 12px; align-items: center;
    }

    .typing-avatar {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .typing-dots { display: flex; gap: 4px; padding: 6px 0; }

    .typing-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--border2); animation: type-bounce 1.2s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes type-bounce {
      0%, 60%, 100% { transform: translateY(0); background: var(--border2); }
      30%           { transform: translateY(-5px); background: var(--accent); }
    }

    /* ── Input bar ──────────────────────────────────────────────── */
    .chat-input-bar { padding: 10px 28px 16px; background: var(--bg); }

    .chat-input-outer { max-width: 720px; margin: 0 auto; }

    .chat-input-wrap {
      display: flex; gap: 10px; align-items: flex-end;
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: 16px; padding: 10px 10px 10px 16px;
      transition: border-color 0.15s, box-shadow 0.15s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.25);
    }

    .chat-input-wrap:focus-within {
      border-color: rgba(217,119,87,0.4);
      box-shadow: 0 0 0 3px rgba(217,119,87,0.07);
    }

    #chatInput {
      flex: 1; border: none; outline: none; background: transparent;
      font-size: 14.5px; font-family: 'Inter', sans-serif; color: var(--text);
      resize: none; min-height: 24px; max-height: 160px; line-height: 1.55;
    }

    #chatInput::placeholder { color: var(--text-subtle); }

    #sendBtn {
      flex-shrink: 0; width: 32px; height: 32px;
      background: var(--accent); border: none; border-radius: 8px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }

    #sendBtn:hover { background: var(--accent-dim); }
    #sendBtn:disabled { background: var(--border); cursor: not-allowed; }
    #sendBtn svg { width: 14px; height: 14px; stroke: white; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

    #micBtn {
      flex-shrink: 0; width: 32px; height: 32px;
      background: var(--surface2); border: none; border-radius: 8px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    #micBtn:hover { background: var(--border2); }
    #micBtn.recording { background: #ef4444; animation: mic-pulse 1.2s ease-in-out infinite; }
    #micBtn svg { width: 15px; height: 15px; stroke: var(--text-muted); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    #micBtn.recording svg { stroke: white; }

    @keyframes mic-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.5); }
      50% { box-shadow: 0 0 0 7px rgba(239,68,68,0); }
    }

    .input-hint { font-size: 11px; color: var(--text-subtle); margin-top: 7px; text-align: center; }

    .input-hint kbd {
      background: var(--surface2); border: 1px solid var(--border2);
      padding: 1px 5px; border-radius: 4px;
      font-size: 10px; font-family: 'Inter', sans-serif;
    }

    /* ── Sidebar panels ─────────────────────────────────────────── */
    .inbox-panel { border-top: 1px solid var(--border); display: flex; flex-direction: column; max-height: 250px; flex-shrink: 0; }

    .inbox-header {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px 8px; flex-shrink: 0;
      font-size: 11px; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.7px;
      border-bottom: 1px solid var(--border);
    }

    .inbox-badge {
      background: var(--accent); color: white;
      font-size: 10px; font-weight: 700;
      padding: 1px 6px; border-radius: 10px; line-height: 1.6;
    }

    .email-list { flex: 1; overflow-y: auto; padding: 6px 8px; }
    .email-list::-webkit-scrollbar { width: 3px; }
    .email-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    .email-card {
      padding: 8px 10px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--bg);
      margin-bottom: 5px; cursor: default; transition: border-color 0.15s;
    }

    .email-card:hover { border-color: var(--border2); }
    .email-card-top { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
    .email-card-sender { font-size: 12px; font-weight: 500; color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .email-card-date { font-size: 10px; color: var(--text-subtle); flex-shrink: 0; }
    .email-card-subject { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 1px; }
    .email-card-snippet { font-size: 10.5px; color: var(--text-subtle); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .email-important-dot { width: 5px; height: 5px; border-radius: 50%; background: #E8A040; flex-shrink: 0; }

    .memories-panel { border-top: 1px solid var(--border); flex-shrink: 0; }

    .memories-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; cursor: pointer;
      font-size: 11px; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.7px;
      user-select: none; transition: color 0.15s;
    }

    .memories-header:hover { color: var(--text); }

    .memories-chevron {
      stroke: currentColor; fill: none; stroke-width: 2.5;
      stroke-linecap: round; stroke-linejoin: round;
      transition: transform 0.2s; flex-shrink: 0;
    }

    .memories-chevron.open { transform: rotate(180deg); }
    .memories-body { padding: 0 8px 8px; display: none; }
    .memories-body.open { display: block; }

    .memory-chip {
      padding: 6px 10px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--bg);
      margin-bottom: 4px; font-size: 11.5px; line-height: 1.5;
    }

    .memory-chip-key { font-weight: 600; color: var(--accent); display: block; margin-bottom: 1px; text-transform: capitalize; font-size: 11px; }
    .memory-chip-value { color: var(--text-muted); }

    .msg-speak-btn {
      background: none; border: none; cursor: pointer; padding: 2px 4px;
      color: var(--text-subtle); display: inline-flex; align-items: center;
      border-radius: 5px; transition: color 0.15s, background 0.15s;
      vertical-align: middle; margin-left: 4px;
    }
    .msg-speak-btn:hover { color: var(--accent); background: var(--accent-light); }
    .msg-speak-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">
    <div class="nav-logo-mark">
      <svg viewBox="0 0 100 100" width="26" height="26" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="navArm0" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#E8A07A"/><stop offset="100%" stop-color="#C05A30"/></linearGradient>
          <linearGradient id="navArm1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#D97757"/><stop offset="100%" stop-color="#B84E2A"/></linearGradient>
          <linearGradient id="navArm2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#C06240"/><stop offset="100%" stop-color="#A04020"/></linearGradient>
          <linearGradient id="navArm3" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#D97757"/><stop offset="100%" stop-color="#C06240"/></linearGradient>
          <linearGradient id="navArm4" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#E8A07A"/><stop offset="100%" stop-color="#D97757"/></linearGradient>
          <linearGradient id="navArm5" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#C06240"/><stop offset="100%" stop-color="#D97757"/></linearGradient>
        </defs>
        <ellipse cx="50" cy="50" rx="10" ry="42" fill="url(#navArm0)" rx="10" transform="rotate(0,50,50)"/>
        <ellipse cx="50" cy="50" rx="10" ry="42" fill="url(#navArm1)" transform="rotate(60,50,50)"/>
        <ellipse cx="50" cy="50" rx="10" ry="42" fill="url(#navArm2)" transform="rotate(120,50,50)"/>
        <ellipse cx="50" cy="50" rx="10" ry="42" fill="url(#navArm3)" transform="rotate(180,50,50)"/>
        <ellipse cx="50" cy="50" rx="10" ry="42" fill="url(#navArm4)" transform="rotate(240,50,50)"/>
        <ellipse cx="50" cy="50" rx="10" ry="42" fill="url(#navArm5)" transform="rotate(300,50,50)"/>
      </svg>
    </div>
    <span>Spike</span>
  </div>

  <div class="nav-title">Personal Digital Assistant</div>

  <div class="nav-user">
    <div class="nav-avatar" id="navAvatar"></div>
    <span class="nav-user-name" id="navName"></span>
    <a href="/auth/logout" class="nav-logout">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign out
    </a>
  </div>
</nav>

<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Upcoming Events</h2>
      <div class="sidebar-date" id="sidebarDate"></div>
      <button class="sidebar-refresh" onclick="loadEvents()">

<script>
  let chatHistory = [];
  let userInitials = 'U';
  let recognition = null;
  let isRecording = false;
  let recognizedText = '';
  let micStream = null;
  let audioCtx = null;
  let levelRaf = null;
  let silenceTimer = null;
  let wakeRecognition = null;
  let isSpeaking = false;

  function toggleMic() {
    if (isRecording) stopMic();
    else startMic();
  }

  function setMicStatus(msg) {
    const el = document.getElementById('micStatus');
    if (el) el.textContent = msg;
  }

  function startLevelMeter(stream) {
    audioCtx = new AudioContext();
    const src = audioCtx.createMediaStreamSource(stream);
    const analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    src.connect(analyser);
    const data = new Uint8Array(analyser.frequencyBinCount);
    const micBtn = document.getElementById('micBtn');
    function tick() {
      if (!isRecording) return;
      analyser.getByteFrequencyData(data);
      const avg = data.reduce((a, b) => a + b, 0) / data.length;
      const r = Math.min(10, Math.round(avg / 4));
      const o = Math.min(0.8, 0.2 + avg / 60).toFixed(2);
      micBtn.style.boxShadow = r > 1 ? `0 0 0 ${r}px rgba(239,68,68,${o})` : '';
      levelRaf = requestAnimationFrame(tick);
    }
    tick();
  }

  function stopLevelMeter() {
    if (levelRaf) { cancelAnimationFrame(levelRaf); levelRaf = null; }
    if (audioCtx) { audioCtx.close(); audioCtx = null; }
    if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
    const micBtn = document.getElementById('micBtn');
    if (micBtn) micBtn.style.boxShadow = '';
  }

  async function startMic() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      alert('Speech recognition is not supported in this browser. Please use Chrome or Edge.');
      return;
    }
    try {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (err) {
      alert('Microphone access was blocked. Click the lock icon in your address bar, allow the microphone, then try again.');
      return;
    }

    const micBtn = document.getElementById('micBtn');
    const input = document.getElementById('chatInput');
    recognizedText = input.value ? input.value.trimEnd() + ' ' : '';
    isRecording = true;
    if (wakeRecognition) { try { wakeRecognition.onend = null; wakeRecognition.stop(); } catch(e){} wakeRecognition = null; }
    micBtn.classList.add('recording');
    micBtn.title = 'Stop recording';
    input.placeholder = 'Listening…';
    setMicStatus('Speak now — watch the button pulse with your voice');
    startLevelMeter(micStream);

    function makeSession() {
      const r = new SpeechRecognition();
      r.continuous = true;
      r.interimResults = true;
      r.lang = 'en-US';

      r.onresult = (e) => {
        let interim = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          if (e.results[i].isFinal) {
            recognizedText += e.results[i][0].transcript + ' ';
          } else {
            interim += e.results[i][0].transcript;
          }
        }
        input.value = (recognizedText + interim).trimEnd();
        autoResize(input);
        clearTimeout(silenceTimer);
        if (recognizedText.trim()) {
          silenceTimer = setTimeout(() => { stopMic(); sendMessage(); }, 3000);
        }
        setMicStatus('');
      };

      r.onerror = (e) => {
        if (e.error === 'not-allowed') { alert('Microphone blocked.'); stopMic(); return; }
        if (e.error === 'network') { setMicStatus('Network error — Chrome needs internet to transcribe.'); stopMic(); return; }
        if (e.error === 'no-speech') setMicStatus('No speech detected — does the button pulse when you talk?');
      };

      r.onend = () => {
        if (isRecording) { recognition = makeSession(); recognition.start(); }
        else {
          input.value = input.value.trim();
          input.placeholder = 'Ask about your schedule or create events…';
          setMicStatus('');
          autoResize(input);
          input.focus();
          recognition = null;
        }
      };
      return r;
    }

    recognition = makeSession();
    recognition.start();
  }

  function stopMic() {
    if (!isRecording && !recognition) return;
    isRecording = false;
    clearTimeout(silenceTimer);
    silenceTimer = null;
    const micBtn = document.getElementById('micBtn');
    micBtn.classList.remove('recording');
    micBtn.title = 'Voice input';
    document.getElementById('chatInput').placeholder = 'Ask about your schedule or create events…';
    setMicStatus('');
    stopLevelMeter();
    if (recognition) { try { recognition.stop(); } catch (err) {} }
    startWakeListener();
  }

  async function playText(text) {
    if (isSpeaking || !text) return;
    isSpeaking = true;
    try {
      const res = await fetch('/api/tts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });
      if (!res.ok) {
        const err = await res.json();
        setMicStatus('TTS error: ' + JSON.stringify(err.error || err));
        isSpeaking = false;
        return;
      }
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const audio = new Audio(url);
      audio.onended = () => { URL.revokeObjectURL(url); isSpeaking = false; };
      audio.onerror = () => { isSpeaking = false; };
      audio.play().catch(() => { isSpeaking = false; URL.revokeObjectURL(url); });
    } catch (e) {
      setMicStatus('TTS failed: ' + e.message);
      isSpeaking = false;
    }
  }

  function playNewestMessage() {
    const bubbles = document.querySelectorAll('.msg.bot .msg-bubble');
    if (!bubbles.length) return;
    playText(bubbles[bubbles.length - 1].innerText.trim());
  }

  function startWakeListener() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition || wakeRecognition) return;

    wakeRecognition = new SpeechRecognition();
    wakeRecognition.continuous = true;
    wakeRecognition.interimResults = false;
    wakeRecognition.lang = 'en-US';

    wakeRecognition.onresult = (e) => {
      const latest = e.results[e.results.length - 1];
      if (!latest.isFinal) return;
      // combine last 3 final results so phrases split across segments still match
      const recentCount = Math.min(3, e.results.length);
      const said = Array.from(e.results).slice(-recentCount).map(r => r[0].transcript).join(' ').toLowerCase();
      if (/voice\s*activ/i.test(said) && !isRecording) {
        wakeRecognition = null;
        startMic();
      } else if (/play\b.*\b(newest|latest|last|recent)\b.*\bmessage/i.test(said)) {
        playNewestMessage();
      }
    };

    wakeRecognition.onend = () => {
      wakeRecognition = null;
      if (!isRecording) startWakeListener();
    };

    wakeRecognition.onerror = () => {
      wakeRecognition = null;
      if (!isRecording) setTimeout(startWakeListener, 2000);
    };

    try { wakeRecognition.start(); } catch (err) { wakeRecognition = null; }
  }

  async function init() {
    try {
      const res = await fetch('/api/user');
      if (res.status === 401) { window.location.href = '/'; return; }
      if (!res.ok) throw new Error('Failed to load user');
      const user = await res.json();

      document.getElementById('navName').textContent = user.name?.split(' ')[0] || user.email;
      userInitials = user.initials || 'U';

      const avatarEl = document.getElementById('navAvatar');
      if (user.picture) {
        avatarEl.innerHTML = `<img src="${user.picture}" alt="${user.name}" />`;
      } else {
        avatarEl.textContent = userInitials;
      }
    } catch (err) {
      console.error('Init error:', err);
    }

    document.getElementById('sidebarDate').textContent = new Date().toLocaleDateString('en-US', {
      weekday: 'long', month: 'long', day: 'numeric'
    });

    loadEvents();
    loadEmails();
    loadMemories();
  }

  let memoriesOpen = false;

  function toggleMemories() {
    memoriesOpen = !memoriesOpen;
    document.getElementById('memoriesBody').classList.toggle('open', memoriesOpen);
    document.getElementById('memoriesChevron').classList.toggle('open', memoriesOpen);
  }

  async function loadEmails() {
    const list = document.getElementById('emailList');
    list.innerHTML = `<div style="padding:8px">
      <div class="skeleton" style="height:56px;margin-bottom:6px;"></div>
      <div class="skeleton" style="height:56px;margin-bottom:6px;"></div>
      <div class="skeleton" style="height:56px;"></div>
    </div>`;

    try {
      const res = await fetch('/api/emails');
      if (!res.ok) throw new Error();
      const { emails, error } = await res.json();

      const badge = document.getElementById('inboxBadge');
      if (error || !emails.length) {
        badge.style.display = 'none';
        list.innerHTML = `<div class="sidebar-empty" style="padding:16px 12px;"><p style="font-size:11.5px;">${error ? 'Enable Gmail API to see emails.' : 'No unread emails.'}</p></div>`;
        return;
      }

      badge.textContent = emails.length;
      badge.style.display = 'inline-block';

      list.innerHTML = emails.map(e => {
        const dot = e.is_important ? `<span class="email-important-dot" title="Important"></span>` : '';
        const dateStr = formatEmailDate(e.date);
        return `<div class="email-card">
          <div class="email-card-top">
            ${dot}
            <span class="email-card-sender">${escHtml(e.from_name || 'Unknown')}</span>
            <span class="email-card-date">${dateStr}</span>
          </div>
          <div class="email-card-subject">${escHtml(e.subject)}</div>
          <div class="email-card-snippet">${escHtml(e.snippet)}</div>
        </div>`;
      }).join('');
    } catch {
      document.getElementById('inboxBadge').style.display = 'none';
      document.getElementById('emailList').innerHTML = `<div class="sidebar-empty"><p style="font-size:11.5px;color:#F87171;">Failed to load emails.</p></div>`;
    }
  }

  function formatEmailDate(dateStr) {
    if (!dateStr) return '';
    try {
      const d = new Date(dateStr);
      const now = new Date();
      const diff = now - d;
      if (diff < 86400000 && d.getDate() === now.getDate()) {
        return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      }
      if (diff < 604800000) {
        return d.toLocaleDateString('en-US', { weekday: 'short' });
      }
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    } catch { return ''; }
  }

  async function loadMemories() {
    try {
      const res = await fetch('/api/memories');
      if (!res.ok) return;
      const { memories } = await res.json();
      const panel = document.getElementById('memoriesPanel');
      const body  = document.getElementById('memoriesBody');
      if (!memories.length) { panel.style.display = 'none'; return; }
      panel.style.display = 'block';
      body.innerHTML = memories.map(m => `
        <div class="memory-chip">
          <span class="memory-chip-key">${escHtml(m.key.replace(/_/g, ' '))}</span>
          <span class="memory-chip-value">${escHtml(m.value)}</span>
        </div>`).join('');
    } catch { /* non-critical */ }
  }

  async function loadEvents() {
    const list = document.getElementById('eventsList');
    list.innerHTML = `<div style="padding:10px">
      <div class="skeleton" style="height:60px;margin-bottom:6px;"></div>
      <div class="skeleton" style="height:60px;margin-bottom:6px;"></div>
      <div class="skeleton" style="height:60px;"></div>
    </div>`;

    try {
      const res = await fetch('/api/events');
      if (!res.ok) throw new Error();
      const { events } = await res.json();
      renderEvents(events);
    } catch {
      list.innerHTML = `<div class="sidebar-empty"><p style="color:#F87171;font-size:12px;">Failed to load events.</p></div>`;
    }
  }

  function renderEvents(events) {
    const list = document.getElementById('eventsList');
    if (!events.length) {
      list.innerHTML = `<div class="sidebar-empty">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <p>No upcoming events.<br/>Ask the assistant to create one!</p>
      </div>`;
      return;
    }

    list.innerHTML = '<div style="padding:8px">' + events.map(e => {
      const start = e.start ? new Date(e.start) : null;
      const timeStr = start
        ? start.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' · ' + start.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })
        : '';
      const loc = e.location ? `<div class="event-location">📍 ${escHtml(e.location)}</div>` : '';
      return `<div class="event-card">
        <div class="event-card-title">${escHtml(e.title)}</div>
        ${timeStr ? `<div class="event-card-time"><span class="event-dot"></span>${timeStr}</div>` : ''}
        ${loc}
      </div>`;
    }).join('') + '</div>';
  }

  function sendSuggestion(btn) {
    document.getElementById('chatInput').value = btn.textContent.trim();
    sendMessage();
  }

  async function sendMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    autoResize(input);
    hideWelcome();

    appendMessage('user', text);
    chatHistory.push({ role: 'user', content: text });

    setTyping(true);
    document.getElementById('sendBtn').disabled = true;

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history: chatHistory.slice(0, -1) })
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Request failed');

      appendMessage('bot', data.message);
      chatHistory.push({ role: 'assistant', content: data.message });
      loadEvents();
      loadEmails();
      loadMemories();
    } catch (err) {
      appendMessage('bot', `Sorry, something went wrong: ${err.message}. Please try again.`);
    } finally {
      setTyping(false);
      document.getElementById('sendBtn').disabled = false;
    }
  }

  function appendMessage(role, text) {
    const messages = document.getElementById('chatMessages');
    const now = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    const isUser = role === 'user';

    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const botAvatarSvg = `<svg viewBox="0 0 100 100" width="22" height="22" xmlns="http://www.w3.org/2000/svg"><ellipse cx="50" cy="50" rx="11" ry="44" fill="#D97757" transform="rotate(0,50,50)" opacity="0.9"/><ellipse cx="50" cy="50" rx="11" ry="44" fill="#C06240" transform="rotate(60,50,50)" opacity="0.9"/><ellipse cx="50" cy="50" rx="11" ry="44" fill="#B85030" transform="rotate(120,50,50)" opacity="0.9"/><ellipse cx="50" cy="50" rx="11" ry="44" fill="#D97757" transform="rotate(180,50,50)" opacity="0.9"/><ellipse cx="50" cy="50" rx="11" ry="44" fill="#E89060" transform="rotate(240,50,50)" opacity="0.9"/><ellipse cx="50" cy="50" rx="11" ry="44" fill="#C87048" transform="rotate(300,50,50)" opacity="0.9"/></svg>`;
    const speakBtn = isUser ? '' : `<button class="msg-speak-btn" title="Play message" onclick="playText(this.closest('.msg').querySelector('.msg-bubble').innerText.trim())">
          <svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
        </button>`;
    div.innerHTML = `
      <div class="msg-inner">
        <div class="msg-avatar">${isUser ? userInitials : botAvatarSvg}</div>
        <div class="msg-body">
          <div class="msg-bubble">${isUser ? escHtml(text) : formatBotText(text)}</div>
          <div class="msg-time">${now}${speakBtn}</div>
        </div>
      </div>`;

    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function hideWelcome() {
    const w = document.getElementById('chatWelcome');
    if (w) w.remove();
  }

  function setTyping(visible) {
    const t = document.getElementById('typingIndicator');
    t.classList.toggle('visible', visible);
    if (visible) document.getElementById('chatMessages').scrollTop = 999999;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function formatBotText(text) {
    return escHtml(text)
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/^• (.+)$/gm, '<li>$1</li>')
      .replace(/^- (.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*<\/li>(\n|$))+/g, m => `<ul>${m}</ul>`)
      .replace(/\n\n/g, '</p><p>')
      .replace(/\n/g, '<br />')
      .replace(/^(.+)$/, '<p>$1</p>');
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  }

  document.getElementById('chatInput').addEventListener('input', function() { autoResize(this); });
  document.getElementById('chatInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  init();
  startWakeListener();
</script>

</body>
</html>
